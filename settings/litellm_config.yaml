# ============================================================
# PharmaCX POC — LiteLLM Gateway Configuration
# Hybrid routing: local Ollama (sensitive) + cloud (general)
# ============================================================

model_list:

  # ── LOCAL MODELS (Category A & B — never leaves your Mac) ──
  - model_name: pharma-local-chat
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://host.docker.internal:11434
      timeout: 120
    model_info:
      mode: chat
      source_label: "Local LLM (llama3.2:3b) — on-premise"
      data_class: "A"
      supports_function_calling: false

  - model_name: pharma-local-reasoning
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://host.docker.internal:11434
      timeout: 180
    model_info:
      mode: chat
      source_label: "Local LLM (phi3:mini) — on-premise"
      data_class: "A"
      supports_function_calling: false

  - model_name: pharma-embed-local
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434
    model_info:
      mode: embedding
      source_label: "Local embedding — on-premise"
      data_class: "A"

  # ── CLOUD MODELS (Category C — sanitized general queries only) ──
  - model_name: pharma-cloud-gpt4o
    litellm_params:
      model: gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      timeout: 60
    model_info:
      mode: chat
      source_label: "Cloud LLM (GPT-4o, OpenAI)"
      data_class: "C"
      supports_function_calling: true

  - model_name: pharma-cloud-claude
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      timeout: 60
    model_info:
      mode: chat
      source_label: "Cloud LLM (Claude Sonnet, Anthropic)"
      data_class: "C"
      supports_function_calling: true

  - model_name: pharma-cloud-gemini
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: os.environ/GEMINI_API_KEY
      timeout: 60
    model_info:
      mode: chat
      source_label: "Cloud LLM (Gemini Flash, Google)"
      data_class: "C"

# ── Router: fallback chain ───────────────────────────────────
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 180
  fallbacks:
    - {"pharma-cloud-gpt4o": ["pharma-cloud-claude", "pharma-cloud-gemini"]}
    - {"pharma-local-chat": ["pharma-local-reasoning"]}

  # Model group aliases used by source_tracker middleware
  model_group_alias:
    local:  ["pharma-local-chat", "pharma-local-reasoning"]
    cloud:  ["pharma-cloud-gpt4o", "pharma-cloud-claude", "pharma-cloud-gemini"]
    embed:  ["pharma-embed-local"]

# ── General settings ─────────────────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: "sqlite:///./litellm.db"
  store_model_in_db: true

litellm_settings:
  success_callback: []
  failure_callback: []
  request_timeout: 180
  drop_params: true
  set_verbose: false
  add_user_information_to_llm_headers: false
